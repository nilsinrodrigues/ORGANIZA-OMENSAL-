        <div class="main-header" id="mainHeader"><div class="month-selector"><button class="month-btn" onclick="changeMonth(-1)">←</button><div class="month-display" id="monthDisplay"></div><button class="month-btn" onclick="changeMonth(1)">→</button></div><div class="summary-row"><div class="summary-card total" id="totalCard" onclick="setFilter('all')"><div class="summary-label">Total</div><div class="summary-value" id="totalGastos">R$ 0,00</div></div><div class="summary-card paid" id="paidCard" onclick="setFilter('paid')"><div class="summary-label">Pago</div><div class="summary-value" id="totalPago">R$ 0,00</div></div><div class="summary-card pending" id="pendingCard" onclick="setFilter('pending')"><div class="summary-label">Pendente</div><div class="summary-value" id="totalPendente">R$ 0,00</div></div></div></div>

    <div class="modal" id="addModal"><div class="modal-content"><h2 class="modal-title">Novo Gasto</h2><form id="expenseForm" onsubmit="addExpense(event)"><div class="form-group"><label class="form-label">Nome</label><input type="text" class="form-input" id="expenseName" required placeholder="Ex: Aluguel"></div><div class="form-group"><label class="form-label">Valor</label><input type="number" class="form-input" id="expenseValue" required step="0.01" placeholder="R$ 0,00"></div><div class="form-group"><label class="form-label">Vencimento</label><input type="date" class="form-input" id="expenseDate" required></div><div class="toggle-row"><span class="toggle-label">Repetir</span><label class="toggle-sw"><input type="checkbox" id="repeatToggle" onchange="toggleRepeat()"><span class="toggle-sl"></span></label></div><div class="repeat-options" id="repeatOptions"><label class="form-label">Tipo de repetição</label><div class="repeat-types"><button type="button" class="repeat-type-btn active" onclick="selectRepeat('fixed',this)">Fixo</button><button type="button" class="repeat-type-btn" onclick="selectRepeat('installment',this)">Parcelado</button></div><div class="inst-group" id="instGroup"><label class="form-label">Quantidade de parcelas</label><input type="number" class="form-input" id="instCount" min="2" max="100" value="2"></div></div><div class="form-actions"><button type="button" class="btn btn-cancel" onclick="goBack();closeAddModal()">Cancelar</button><button type="submit" class="btn btn-save">Salvar</button></div></form></div></div>

    <div class="modal" id="aboutModal"><div class="modal-content"><h2 class="modal-title">📋 Sobre</h2><div id="aboutDisplay" class="about-display"></div><button type="button" class="btn btn-save" style="width:100%;margin-top:16px" onclick="closeAboutModal()">Fechar</button></div></div>

<script>
// ============================================
// FINANCEPRO - OFFLINE PWA
// ============================================

// Registro do Service Worker para funcionamento offline
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('Service Worker registrado com sucesso:', reg);
    }).catch(err => {
        console.log('Falha ao registrar Service Worker:', err);
    });
}

// Detectar status de conexão
function updateOnlineStatus() {
    const badge = document.getElementById('offlineBadge');
    if (!navigator.onLine) {
        badge.classList.add('active');
    } else {
        badge.classList.remove('active');
    }
}

window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// Dados offline - tudo salvo no localStorage
// Inicialização e carregamento dos dados
let nav=['home'],backing=false,exitClicks=0,exitTimer=null;
function pushState(s){if(backing){backing=false;return}if(nav[nav.length-1]!==s){nav.push(s);history.pushState({appState:s},'','')}}
function goBack(){if(nav.length>1){backing=true;nav.pop();closeAll();history.back()}}
function closeAll(){addModal.classList.remove('active');editModal.classList.remove('active');aboutModal.classList.remove('active');aboutEditModal.classList.remove('active');confirmDialog.classList.remove('active');settingsMenu.classList.remove('active');themeSubmenu.classList.remove('active');detailScreen.classList.remove('active');resetAdd();editForm.reset();aboutEditForm.reset();update()}
function resetAdd(){expenseForm.reset();repeatToggle.checked=false;repeatOptions.classList.remove('active');instGroup.classList.remove('active');instCount.value=2;document.querySelectorAll('#addModal .repeat-type-btn').forEach((b,i)=>b.classList.toggle('active',i===0));repeatType='fixed'}
window.addEventListener('popstate',()=>{if(nav.length>1){backing=true;nav.pop();closeAll()}else{nav=['home'];closeAll()}});history.pushState({appState:'home'},'','');nav=['home'];

let cur=new Date();
let expenses=JSON.parse(localStorage.getItem('financepro_expenses'))||[];
let repeatType='fixed',activeFilter='all';
let appName=localStorage.getItem('financepro_appName')||'Minhas Despesas';
let theme=localStorage.getItem('financepro_theme')||'light';
// INFORMAÇÃO DO SOBRE - SALVA PERMANENTEMENTE
let aboutInfo=localStorage.getItem('financepro_aboutInfo')||'Criado por [Nilsin L R F]\nTodos os direitos reservados © 2026\n\nV 2.0.0 (PWA - Funciona Offline!)';
let clicks=0,clickTm=null,aboutClicks=0,aboutClickTm=null;

document.documentElement.setAttribute('data-theme',theme);
updateThemeUI();
appTitleText.textContent=appName;

function toggleRepeat(){let t=repeatToggle,o=repeatOptions;if(t.checked){o.classList.add('active');selectRepeat('fixed',document.querySelector('#addModal .repeat-type-btn:first-child'))}else{o.classList.remove('active');instGroup.classList.remove('active')}}
function selectRepeat(t,b){repeatType=t;document.querySelectorAll('#addModal .repeat-type-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');instGroup.classList.toggle('active',t==='installment')}
function setFilter(f){activeFilter=f;totalCard.classList.toggle('active',f==='all');paidCard.classList.toggle('active',f==='paid');pendingCard.classList.toggle('active',f==='pending');let fi=filterIndicator,ft=filterText;if(f==='all')fi.classList.remove('active');else if(f==='paid'){fi.classList.add('active');ft.textContent='📋 Mostrando: Gastos Pagos'}else{fi.classList.add('active');ft.textContent='📋 Mostrando: Gastos Pendentes'}updateExpenses()}

let msX=0,msCur=0,msSwiping=false,mdEl=null,hasMoved=false;
function setupMonthSwipe(){mdEl=document.getElementById('monthDisplay');mdEl.addEventListener('touchstart',e=>{msX=e.touches[0].clientX;msSwiping=true;hasMoved=false},{passive:true});mdEl.addEventListener('touchmove',e=>{if(!msSwiping)return;e.preventDefault();msCur=e.touches[0].clientX;let d=msCur-msX;if(Math.abs(d)>5){hasMoved=true;mdEl.style.transition='none';mdEl.classList.toggle('swiping-right',d>0);mdEl.classList.toggle('swiping-left',d<0);mdEl.style.transform=`translateX(${d*.4}px)`;mdEl.style.opacity=`${1-Math.min(Math.abs(d)/200,.5)}`}},{passive:false});mdEl.addEventListener('touchend',()=>{if(!msSwiping)return;msSwiping=false;let d=msCur-msX;mdEl.style.transition='transform .3s,opacity .3s';mdEl.style.transform='';mdEl.style.opacity='';mdEl.classList.remove('swiping-left','swiping-right');if(hasMoved&&Math.abs(d)>40){changeMonth(d>0?-1:1);if(navigator.vibrate)navigator.vibrate(15)}setTimeout(()=>{mdEl.style.transition=''},300)},{passive:true});let mx=0,md=false,moved=false;mdEl.addEventListener('mousedown',e=>{mx=e.clientX;md=true;moved=false;mdEl.style.transition='none'});document.addEventListener('mousemove',e=>{if(!md)return;let d=e.clientX-mx;if(Math.abs(d)>5){moved=true;mdEl.classList.toggle('swiping-right',d>0);mdEl.classList.toggle('swiping-left',d<0);mdEl.style.transform=`translateX(${d*.4}px)`;mdEl.style.opacity=`${1-Math.min(Math.abs(d)/200,.5)}`}});document.addEventListener('mouseup',e=>{if(!md)return;md=false;let d=e.clientX-mx;mdEl.style.transition='transform .3s,opacity .3s';mdEl.style.transform='';mdEl.style.opacity='';mdEl.classList.remove('swiping-left','swiping-right');if(moved&&Math.abs(d)>40)changeMonth(d>0?-1:1);setTimeout(()=>{mdEl.style.transition=''},300)})}

document.addEventListener('click',function(e){if(!e.target.closest('#settingsBtn')&&!e.target.closest('#settingsMenu')&&settingsMenu.classList.contains('active')){settingsMenu.classList.remove('active');themeSubmenu.classList.remove('active');goBack();return}if(confirmDialog.classList.contains('active')||addModal.classList.contains('active')||editModal.classList.contains('active')||aboutModal.classList.contains('active')||aboutEditModal.classList.contains('active'))return;if(detailScreen.classList.contains('active')&&!e.target.closest('.detail-card')&&!e.target.closest('.detail-topbar')&&!e.target.closest('.detail-desc-textarea')&&!e.target.closest('.detail-desc-save-btn')){closeDetailScreen();return}if(!detailScreen.classList.contains('active')){if(!e.target.closest('.expense-item')&&!e.target.closest('.main-header')&&!e.target.closest('.top-bar')){if(nav.length<=1||nav[nav.length-1]==='home'){exitClicks++;if(exitTimer)clearTimeout(exitTimer);if(exitClicks>=2){exitClicks=0;if(navigator.app&&navigator.app.exitApp)navigator.app.exitApp();else if(window.close)window.close();else window.location.href='about:blank'}else exitTimer=setTimeout(()=>{exitClicks=0},600)}else goBack()}}});

function openDetailScreen(id){pushState('detail');let exp=expenses.find(x=>x.id===id);if(!exp)return;let st=status(exp),ed=new Date(exp.date+'T00:00:00'),badge='';if(exp.type==='fixed')badge='FIXO';else if(exp.type==='installment')badge=`${exp.installmentNumber||'?'}/${exp.totalInstallments||'?'}`;detailTopTitle.textContent=exp.name+(badge?' · '+badge:'');detailName.innerHTML=exp.name+(badge?` <span class="badge ${exp.type==='fixed'?'badge-fixed':'badge-inst'}">${badge}</span>`:'');detailAmount.textContent=fmt(exp.value);detailDate.textContent='📅 Vencimento: '+ed.toLocaleDateString('pt-BR');let stEl=detailStatus;if(st==='paid'){stEl.textContent='✅ Pago';stEl.className='detail-card-status paid-st'}else if(st==='overdue'){stEl.textContent='⚠️ Vencido';stEl.className='detail-card-status overdue-st'}else{stEl.textContent='⏳ Pendente';stEl.className='detail-card-status pending-st'}let card=detailCard;card.className='detail-card';if(st==='paid')card.classList.add('paid');else if(st==='overdue')card.classList.add('overdue');let desc=exp.description||'';if(desc){detailDescArea.innerHTML=`<div class="detail-desc-display" onclick="event.stopPropagation();startDetailDesc(${exp.id})">📝 ${desc.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`}else{detailDescArea.innerHTML=`<div class="detail-desc-display empty" onclick="event.stopPropagation();startDetailDesc(${exp.id})">✏️ Toque para adicionar descrição...</div>`}let editBtn=exp.type==='one-time'?`<button class="detail-action-big edit-btn" onclick="openEditFromDetail(${exp.id})">✏️ Editar</button>`:'';let payBtn=exp.paid?`<button class="detail-action-big unpay-btn" onclick="togglePaidFromDetail(${exp.id})">↩️ Desmarcar</button>`:`<button class="detail-action-big pay-btn" onclick="togglePaidFromDetail(${exp.id})">✅ Pagar</button>`;detailActions.innerHTML=editBtn+payBtn+`<button class="detail-action-big delete-btn" onclick="delFromDetail(${exp.id})">🗑️ Excluir</button>`;detailScreen.classList.add('active')}
function closeDetailScreen(){document.querySelectorAll('.detail-desc-textarea').forEach(ta=>{let id=parseInt(ta.id.replace('detailDescTA-',''));let exp=expenses.find(x=>x.id===id);if(exp){exp.description=ta.value.trim();}});save();detailScreen.classList.remove('active');goBack()}
function startDetailDesc(id){let exp=expenses.find(x=>x.id===id);if(!exp)return;let current=exp.description||'';detailDescArea.innerHTML=`<div class="detail-desc-edit-area"><textarea class="detail-desc-textarea" id="detailDescTA-${id}" rows="4">${current.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea><button class="detail-desc-save-btn" onclick="event.stopPropagation();saveDetailDesc(${id})">✓</button></div>`;let ta=document.getElementById('detailDescTA-'+id);setTimeout(()=>{ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length)},100)}
function saveDetailDesc(id){let ta=document.getElementById('detailDescTA-'+id);let val=ta?ta.value.trim():'';let exp=expenses.find(x=>x.id===id);if(!exp)return;exp.description=val;save();if(val){detailDescArea.innerHTML=`<div class="detail-desc-display" onclick="event.stopPropagation();startDetailDesc(${id})">📝 ${val.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`}else{detailDescArea.innerHTML=`<div class="detail-desc-display empty" onclick="event.stopPropagation();startDetailDesc(${id})">✏️ Toque para adicionar descrição...</div>`}}
function togglePaidFromDetail(id){let exp=expenses.find(x=>x.id===id);if(!exp)return;exp.paid=!exp.paid;save();openDetailScreen(id)}
function openEditFromDetail(id){let exp=expenses.find(x=>x.id===id);if(!exp||exp.type!=='one-time')return;pushState('edit');detailScreen.classList.remove('active');expenses=JSON.parse(localStorage.getItem('financepro_expenses'))||[];let f=expenses.find(x=>x.id===id);if(!f)return;editId.value=f.id;editName.value=f.name;editValue.value=f.value;editDate.value=f.date;editModal.classList.add('active');update()}
function delFromDetail(id){let exp=expenses.find(x=>x.id===id);if(!exp)return;if(exp.type==='fixed'||exp.type==='installment'){let tl=exp.type==='fixed'?'Fixo':'Parcelado';showConfirm({icon:'🗑️',title:`Excluir Gasto ${tl}`,subtitle:`"${exp.name}"`,msgIcon:'📋',msg:`"${exp.name}" é um gasto ${tl.toLowerCase()} mensal.`,actions:[{text:'Cancelar',cls:'cancel',cb:()=>{if(detailScreen.classList.contains('active'))openDetailScreen(id)}},{text:'Excluir apenas este mês',cls:'secondary',cb:()=>{expenses=expenses.filter(x=>x.id!==id);save();detailScreen.classList.remove('active');update();goBack()}},{text:'Excluir este mês e os próximos',cls:'warning',cb:()=>{let ce=expenses.find(x=>x.id===id);if(!ce)return;let cd=new Date(ce.date+'T00:00:00');expenses=expenses.filter(x=>{if(x.type===ce.type&&x.name===ce.name){let xd=new Date(x.date+'T00:00:00');return xd<cd}return true});save();detailScreen.classList.remove('active');update();goBack()}},{text:'Excluir todos os meses',cls:'danger',cb:()=>{expenses=expenses.filter(x=>!((x.type==='fixed'||x.type==='installment')&&x.name===exp.name));save();detailScreen.classList.remove('active');update();goBack()}}]})}else{showConfirm({icon:'🗑️',title:'Excluir Gasto',subtitle:`"${exp.name}"`,msgIcon:'⚠️',msg:`Excluir "${exp.name}"?`,actions:[{text:'Cancelar',cls:'cancel',cb:()=>{if(detailScreen.classList.contains('active'))openDetailScreen(id)}},{text:'Sim, excluir',cls:'danger',cb:()=>{expenses=expenses.filter(x=>x.id!==id);save();detailScreen.classList.remove('active');update();goBack()}}]})}}

appTitle.addEventListener('click',function(e){if(this.classList.contains('editing'))return;clicks++;if(clickTm)clearTimeout(clickTm);if(clicks===3){clicks=0;startEditTitle()}else{clickTm=setTimeout(()=>{clicks=0},500)}});
function startEditTitle(){let t=appTitle,tx=appTitleText;t.classList.add('editing');let inp=document.createElement('input');inp.type='text';inp.className='app-title-input';inp.value=tx.textContent;inp.id='titleInp';tx.style.display='none';t.appendChild(inp);inp.focus();inp.select();inp.addEventListener('blur',saveTitle);inp.addEventListener('keydown',e=>{if(e.key==='Enter')saveTitle();if(e.key==='Escape')cancelTitle()})}
function saveTitle(){let inp=document.getElementById('titleInp');if(!inp)return;appName=inp.value.trim()||'Minhas Despesas';localStorage.setItem('financepro_appName',appName);appTitleText.textContent=appName;cancelTitle()}
function cancelTitle(){appTitleText.style.display='';appTitle.classList.remove('editing');let inp=document.getElementById('titleInp');if(inp)inp.remove()}

function toggleSettingsMenu(e){e.stopPropagation();let m=settingsMenu;m.classList.toggle('active');if(!m.classList.contains('active')){themeSubmenu.classList.remove('active');goBack()}}
function toggleThemeSubmenu(e){e.stopPropagation();themeSubmenu.classList.toggle('active');updateThemeUI()}
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('financepro_theme',t);theme=t;updateThemeUI();closeAll();nav=['home']}
function updateThemeUI(){document.querySelectorAll('.theme-option').forEach(b=>b.classList.toggle('active',b.dataset.theme===theme));let dot=document.getElementById('themeSubDot'),name=document.getElementById('themeSubName');if(dot&&name){dot.className='theme-sub-header-dot '+(theme==='light'?'light':'dark');name.textContent=theme==='light'?'Claro':'Escuro'}}

// ===== SOBRE - INFO FIXA E PERSISTENTE =====
function openAboutModal(){
    pushState('about');
    settingsMenu.classList.remove('active');themeSubmenu.classList.remove('active');
    aboutInfo=localStorage.getItem('financepro_aboutInfo')||'Criado por [Nilsin L R F]\nTodos os direitos reservados © 2026\n\nV 2.0.0 (PWA - Funciona Offline!)';
    document.getElementById('aboutDisplay').textContent=aboutInfo;
    aboutModal.classList.add('active');
    aboutClicks=0;
}
function closeAboutModal(){aboutModal.classList.remove('active');goBack()}
function closeAboutEditModal(){aboutEditModal.classList.remove('active')}
document.getElementById('aboutDisplay').addEventListener('click',function(){
    aboutClicks++;if(aboutClickTm)clearTimeout(aboutClickTm);
    if(aboutClicks===3){aboutClicks=0;openAboutEditModal()}
    else{aboutClickTm=setTimeout(()=>{aboutClicks=0},600)}
});
function openAboutEditModal(){
    pushState('aboutEdit');
    aboutModal.classList.remove('active');
    aboutInfo=localStorage.getItem('financepro_aboutInfo')||'Criado por [Nilsin L R F]\nTodos os direitos reservados © 2026\n\nV 2.0.0 (PWA - Funciona Offline!)';
    document.getElementById('aboutEditText').value=aboutInfo;
    aboutEditModal.classList.add('active');
}
function saveAboutInfo(e){
    e.preventDefault();
    aboutInfo=document.getElementById('aboutEditText').value.trim();
    if(!aboutInfo)aboutInfo='Criado por [Nilsin L R F]\nTodos os direitos reservados © 2026\n\nV 2.0.0 (PWA - Funciona Offline!)';
    localStorage.setItem('financepro_aboutInfo',aboutInfo);
    closeAboutEditModal();
    aboutModal.classList.add('active');
    document.getElementById('aboutDisplay').textContent=aboutInfo;
}

function save(){localStorage.setItem('financepro_expenses',JSON.stringify(expenses))}
function fmt(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v)}
function isLeap(y){return(y%4===0&&y%100!==0)||y%400===0}
function febDays(y){return isLeap(y)?29:28}
function validDay(d,y,m){if(m!==1)return d;let f=febDays(y);if(d===29)return isLeap(y)?29:28;if(d===30||d===31)return f;return d}
function status(exp){if(exp.paid)return'paid';let t=new Date();t.setHours(0,0,0,0);let d=new Date(exp.date+'T00:00:00');d.setHours(0,0,0,0);return d<t?'overdue':'pending'}
function showConfirm(opts){pushState('confirm');confirmIconCircle.textContent=opts.icon||'🗑️';confirmTitle.textContent=opts.title;confirmSubtitle.textContent=opts.subtitle||'';confirmMsgIcon.textContent=opts.msgIcon||'⚠️';confirmMsg.textContent=opts.msg;let ac=confirmActions;ac.innerHTML='';opts.actions.forEach(a=>{let b=document.createElement('button');b.className=`confirm-btn ${a.cls||'cancel'}`;b.textContent=a.text;b.onclick=()=>{closeConfirm();if(a.cb)a.cb();goBack()};ac.appendChild(b)});confirmDialog.classList.add('active')}
function closeConfirm(){confirmDialog.classList.remove('active')}
function update(){let m=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];monthDisplay.textContent=`${m[cur.getMonth()]} ${cur.getFullYear()}`;updateExpenses();updateSummary()}
function changeMonth(d){cur.setMonth(cur.getMonth()+d);update()}
function togglePaidList(id,e){e.stopPropagation();let exp=expenses.find(x=>x.id===id);if(exp){exp.paid=!exp.paid;save();update()}}
function openEditModal(id,e){e.stopPropagation();let exp=expenses.find(x=>x.id===id);if(!exp||exp.type!=='one-time')return;pushState('edit');expenses=JSON.parse(localStorage.getItem('financepro_expenses'))||[];let f=expenses.find(x=>x.id===id);if(!f)return;editId.value=f.id;editName.value=f.name;editValue.value=f.value;editDate.value=f.date;editModal.classList.add('active');update()}
function saveEdit(e){e.preventDefault();let id=parseInt(editId.value);expenses=JSON.parse(localStorage.getItem('financepro_expenses'))||[];let exp=expenses.find(x=>x.id===id);if(!exp){closeEditModal();goBack();update();return}exp.name=editName.value.trim();exp.value=parseFloat(editValue.value);exp.date=editDate.value;save();closeEditModal();goBack();update()}
function closeEditModal(){editModal.classList.remove('active');editForm.reset()}
function createFixed(data){let sd=new Date(data.date+'T00:00:00'),od=sd.getDate(),sy=sd.getFullYear(),sm=sd.getMonth(),bid=Date.now();for(let i=0;i<60;i++){let tm=sm+i,y=sy+Math.floor(tm/12),m=tm%12,vd=validDay(od,y,m),ds=`${y}-${String(m+1).padStart(2,'0')}-${String(vd).padStart(2,'0')}`;if(!expenses.some(x=>x.type==='fixed'&&x.name===data.name&&x.date===ds))expenses.push({id:bid+i+Math.random(),name:data.name,value:data.value,date:ds,paid:false,type:'fixed',originalDate:data.date,originalDay:od,description:''})}}
function createInst(data,c){let sd=new Date(data.date+'T00:00:00'),od=sd.getDate(),sy=sd.getFullYear(),sm=sd.getMonth(),bid=Date.now();for(let i=0;i<c;i++){let tm=sm+i,y=sy+Math.floor(tm/12),m=tm%12,vd=validDay(od,y,m),ds=`${y}-${String(m+1).padStart(2,'0')}-${String(vd).padStart(2,'0')}`;if(!expenses.some(x=>x.type==='installment'&&x.name===data.name&&x.date===ds))expenses.push({id:bid+i+Math.random(),name:data.name,value:data.value,date:ds,paid:false,type:'installment',originalDate:data.date,originalDay:od,installmentNumber:i+1,totalInstallments:c,description:''})}}
function addExpense(e){e.preventDefault();let data={id:Date.now(),name:expenseName.value,value:parseFloat(expenseValue.value),date:expenseDate.value,paid:false,type:'one-time',originalDate:expenseDate.value,originalDay:new Date(expenseDate.value+'T00:00:00').getDate(),description:''};if(repeatToggle.checked){if(repeatType==='fixed'){data.type='fixed';createFixed(data)}else{data.type='installment';createInst(data,Math.min(parseInt(instCount.value)||2,100))}}else{expenses.push(data)}save();closeAddModal();goBack();update()}
function updateExpenses(){let y=cur.getFullYear(),m=cur.getMonth();expenses=JSON.parse(localStorage.getItem('financepro_expenses'))||[];let f=expenses.filter(e=>{let d=new Date(e.date+'T00:00:00');return d.getFullYear()===y&&d.getMonth()===m});if(activeFilter==='paid')f=f.filter(e=>e.paid);else if(activeFilter==='pending')f=f.filter(e=>!e.paid);f.sort((a,b)=>new Date(a.date+'T00:00:00')-new Date(b.date+'T00:00:00'));if(f.length===0){let msg='Nenhum gasto este mês';if(activeFilter==='paid')msg='Nenhum gasto pago';else if(activeFilter==='pending')msg='Nenhum gasto pendente';expensesList.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">${msg}</div><div class="empty-sub">Toque em + para adicionar</div></div>`;return}expensesList.innerHTML=f.map(exp=>{let ed=new Date(exp.date+'T00:00:00'),st=status(exp),badge='';if(exp.type==='fixed')badge='<span class="badge badge-fixed">FIXO</span>';else if(exp.type==='installment')badge=`<span class="badge badge-inst">${exp.installmentNumber||'?'}/${exp.totalInstallments||'?'}</span>`;return `<div class="expense-item ${st}" onclick="event.stopPropagation();openDetailScreen(${exp.id})"><div class="expense-header"><div class="expense-info"><div class="expense-name">${exp.name}${badge}</div><div class="expense-date">Venc: ${ed.toLocaleDateString('pt-BR')}</div></div><div class="expense-amount">${fmt(exp.value)}</div><div class="expense-check${exp.paid?' paid':''}" onclick="event.stopPropagation();togglePaidList(${exp.id},event)">${exp.paid?'✓':(st==='overdue'?'!':'')}</div></div></div>`}).join('');updateSummary()}
function updateSummary(){let y=cur.getFullYear(),m=cur.getMonth(),me=expenses.filter(e=>{let d=new Date(e.date+'T00:00:00');return d.getFullYear()===y&&d.getMonth()===m});totalGastos.textContent=fmt(me.reduce((s,e)=>s+e.value,0));totalPago.textContent=fmt(me.filter(e=>e.paid).reduce((s,e)=>s+e.value,0));totalPendente.textContent=fmt(me.reduce((s,e)=>s+e.value,0)-me.filter(e=>e.paid).reduce((s,e)=>s+e.value,0))}
function openAddModal(){pushState('add');addModal.classList.add('active');expenseDate.value=new Date().toISOString().split('T')[0];resetAdd()}
function closeAddModal(){addModal.classList.remove('active');resetAdd()}
addModal.addEventListener('click',function(e){if(e.target===this){closeAddModal();goBack()}});editModal.addEventListener('click',function(e){if(e.target===this){closeEditModal();goBack()}});confirmDialog.addEventListener('click',function(e){if(e.target===this){closeConfirm();goBack()}});aboutModal.addEventListener('click',function(e){if(e.target===this){closeAboutModal();goBack()}});aboutEditModal.addEventListener('click',function(e){if(e.target===this){closeAboutEditModal();goBack()}});
setupMonthSwipe();update();

// Install prompt para PWA
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(() => {
        if (deferredPrompt) {
            const installBtn = document.createElement('button');
            installBtn.className = 'settings-menu-item';
            installBtn.innerHTML = '📲 Instalar App';
            installBtn.onclick = () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
                    settingsMenu.classList.remove('active');
                }
            };
            const menu = document.getElementById('settingsMenu');
            const themeBtn = menu.querySelector('.settings-menu-item:first-child');
            if (!menu.querySelector('.settings-menu-item.install-btn')) {
                installBtn.classList.add('install-btn');
                menu.insertBefore(installBtn, themeBtn.nextSibling);
            }
        }
    }, 1000);
});
</script>
